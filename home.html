<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code and Care Mobile Financial Services</title>

    <!-- tailwind css and js -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <main class="flex justify-center">
      <div class="mockup-phone h-170">
        <div class="mockup-phone-camera"></div>
        
        <div
      class="mockup-phone-display text- bg-gray-400 flex flex-col justify-center items-center">
          <!-- Main Balance Display -->

          <div class="stats shadow bg-blue-300">
            <div class="stat">
              <div class="stat-value">80500</div>
            </div>
          </div>
           <!-- divider added -->
         <div class="divider divider-success w-full px-10"></div>

         <!-- Button Added -->
          <div>
                 <button class="btn">Add Money</button>
                <Button class="btn">Cash Out</Button>
          </div>

            <!-- divider added -->
          <div class="divider divider-success w-full px-10"></div>
           <!-- Money add form -->

           <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl">
           <div class="card-body">
           <fieldset class="fieldset">
          <label class="label">Add Amount</label>
          <input type="number" id="input-add-amount" class="input" placeholder="Add amount" />
          <label class="label">Pin</label>
          <input type="text" id="input-typed-pin" class="input" placeholder="Pin" />
          
          <button class="btn btn-neutral mt-4" id="add-money-btn-success">Add Money</button>
          </fieldset>
           </div>
           </div>

           <!-- Cash Out Form -->
            <div class=" hidden card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl">
           <div class="card-body">
           <fieldset class="fieldset">
          <label class="label">Cash Out Amount</label>
          <input type="number" id="input-cash-out-amount" class="input" placeholder="cash out amount" />
          <label class="label">Pin</label>
          <input type="text" id="input-cash-out-pin" class="input" placeholder="Pin" />
          
          <button class="btn btn-neutral mt-4" id="input-cash-out-btn-success">Cash Out</button>
          </fieldset>
           </div>
           </div>

      
          </div>
      

         

        </div>
      </div>
    </main>
    <script src="addMoney.js"></script>
  </body>
</html>
